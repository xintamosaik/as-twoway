<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AS memory lanes</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #10141a;
    }

    #screen {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #2a3342;
      background: #000;
    }

    #debug {
      position: fixed;
      left: 8px;
      top: 8px;
      margin: 0;
      padding: 6px 8px;
      background: rgba(0, 0, 0, 0.6);
      color: #d5deeb;
      border: 1px solid #2a3342;
      font: 12px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="screen" width="160" height="100"></canvas>
  <pre id="debug">state: waiting...</pre>

  <script type="module">
    const wasm = await WebAssembly.instantiateStreaming(
      fetch("./build/release.wasm"),
      {}
    );

    const memory = wasm.instance.exports.memory;

    const {
      width,
      height,
      framePtr,
      frameLen,
      inputPtr,
      inputLen,
      statePtr,
      stateLen,
      tick: wasmTick,
      render
    } = wasm.instance.exports;

    const w = width();
    const h = height();

    const frame = new Uint8ClampedArray(memory.buffer, framePtr(), frameLen());
    const input = new Uint8Array(memory.buffer, inputPtr(), inputLen());
    const state = new Int32Array(memory.buffer, statePtr(), stateLen() / 4);

    const IN_LEFT_UP = 0;
    const IN_LEFT_DOWN = 1;
    const IN_RIGHT_UP = 2;
    const IN_RIGHT_DOWN = 3;

    const keys = {
      KeyW: false,
      KeyS: false,
      ArrowUp: false,
      ArrowDown: false
    };

    window.addEventListener("keydown", (event) => {
      if (event.code in keys) {
        keys[event.code] = true;
        event.preventDefault();
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code in keys) {
        keys[event.code] = false;
        event.preventDefault();
      }
    });

    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");
    const debug = document.getElementById("debug");

    canvas.width = w;
    canvas.height = h;
    ctx.imageSmoothingEnabled = false;
    const image = new ImageData(frame, w, h);

    function resizeCanvas() {
      // Keep pixels crisp by scaling only in whole-number steps.
      const maxScaleX = Math.floor((window.innerWidth - 16) / w);
      const maxScaleY = Math.floor((window.innerHeight - 16) / h);
      const scale = Math.max(1, Math.min(maxScaleX, maxScaleY));

      canvas.style.width = `${w * scale}px`;
      canvas.style.height = `${h * scale}px`;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let last = performance.now();
    let acc = 0;
    const step = 1000 / 120;

    function frameLoop(now) {
      acc += now - last;
      last = now;

      // JS writes input lane
      input[IN_LEFT_UP] = keys.KeyW ? 1 : 0;
      input[IN_LEFT_DOWN] = keys.KeyS ? 1 : 0;
      input[IN_RIGHT_UP] = keys.ArrowUp ? 1 : 0;
      input[IN_RIGHT_DOWN] = keys.ArrowDown ? 1 : 0;

      // Run simulation at a fixed cadence, independent of display refresh.
      while (acc >= step) {
        wasmTick();
        acc -= step;
      }

      // WASM writes framebuffer lane
      render();

      // JS reads state lane
      debug.textContent = `ball: (${state[0]}, ${state[1]})\nleftY: ${state[2]}\nrightY: ${state[3]}`;

      // JS reads framebuffer lane
      ctx.putImageData(image, 0, 0);

      requestAnimationFrame(frameLoop);
    }

    requestAnimationFrame(frameLoop);
  </script>
</body>
</html>
